<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
	<script src="/play/board.js"></script>
</head>
<body>	
	<script type="text/javascript">
		async function redirectToGame(isOnline) {
			let response = await fetch(`/play/game?isOnline=${isOnline}`, {
				method: "GET"
			})
			const url = await response.text();
      window.location.href = url; // Redirect to the generated URL`
		}
	</script>
	<div class="h-5/6 md:w-11/12 w-full flex justify-center items-center gap-8">
		<div id="game-container" class="w-2/3 h-full flex justify-center items-center flex-col">
			<div id="opponent-stats" class="border-black border-2 w-full p-2 flex flex-col">
				<h1 id="opponent-time" class="font-bold text-3xl">5:00</h1>
				<h2>Opponent</h2>
			</div>
			<div id="player-stats" class="border-black border-2 w-full p-2 flex flex-col">
				<h1 id="your-time" class="font-bold text-3xl">5:00</h1>
				<h2>You</h2>
			</div>
		</div>
		<div id="game-menu" class="w-1/3 gap-8 flex flex-col">
			<h1 id="players-waiting">Is a player currently waiting: <span id="player-waiting-no">0</span></h1>
			<button type="button" onclick="getMatch()">Request Match</button>
		</div>
	</div>
</body>
</html>
